<!-- templates/register_patient.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Patient - Wellmeadows Hospital</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <div class="navbar">
      <h1>Wellmeadows Hospital</h1>
      <nav>
        <a href="/">Home</a>
        <a href="/patients">Patients</a>
        <a href="/appointments">Appointments</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card fade-in">
      <h2>Register New Patient</h2>
      <form method="post" action="/patients/register">
        <label>First Name:</label>
        <input type="text" name="first_name" required>

        <label>Last Name:</label>
        <input type="text" name="last_name" required>

        <label>Address:</label>
        <textarea name="address" rows="2" required></textarea>

        <label>Telephone:</label>
        <input type="text" name="telephone" required>

        <label>Date of Birth:</label>
        <input type="date" name="date_of_birth" required>

        <label>Sex:</label>
        <select name="sex" required>
          <option value="M">Male</option>
          <option value="F">Female</option>
        </select>

        <label>Marital Status:</label>
        <input type="text" name="marital_status">

        <label>Referring Doctor (clinic number):</label>
        <input type="text" name="referring_doctor">

        <button type="submit">Register Patient</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Wellmeadows Hospital. All rights reserved.</p>
  </footer>
</body>
</html>
