<!-- templates/book_appointment.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Appointment</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
  <header>
    <div class="navbar">
      <h1>Wellmeadows Hospital</h1>
      <nav>
        <a href="/">Home</a>
        <a href="/appointments" class="active">Appointments</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card fade-in">
      <h2>Book New Appointment</h2>
      <form method="post" action="/appointments/book">
        <label for="patient_number">Select Patient:</label>
        <select name="patient_number" required>
          {% for p in patients %}
          <option value="{{ p[0] }}">{{ p[1] }} {{ p[2] }} ({{ p[0] }})</option>
          {% endfor %}
        </select>

        <label for="consultant_id">Select Consultant:</label>
        <select name="consultant_id" required>
          {% for c in consultants %}
          <option value="{{ c[0] }}">{{ c[1] }} {{ c[2] }} - {{ c[3] }}</option>
          {% endfor %}
        </select>

        <label for="appointment_date">Date:</label>
        <input type="date" name="appointment_date" required>

        <label for="appointment_time">Time:</label>
        <input type="time" name="appointment_time" required>

        <label for="examination_room">Examination Room:</label>
        <input type="text" name="examination_room" required placeholder="e.g., Room 101">

        <button type="submit">Book Appointment</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Wellmeadows Hospital. All rights reserved.</p>
  </footer>
</body>
</html>
